name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/release-charts.yml"
      - ".cr.yaml"
      - "artifacthub-repo.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint charts
        run: helm lint charts/kube-pod-alerts

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: .cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Publish Artifact Hub metadata
        run: |
          cp artifacthub-repo.yml gh-pages/artifacthub-repo.yml
          cd gh-pages
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add artifacthub-repo.yml
          if git diff --cached --quiet; then
            echo "artifacthub-repo.yml already up to date"
            exit 0
          fi
          git commit -m "Publish Artifact Hub repository metadata"
          git push origin gh-pages
