apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-pod-alerts
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-pod-alerts
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-pod-alerts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-pod-alerts
subjects:
  - kind: ServiceAccount
    name: kube-pod-alerts
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-pod-alerts
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-pod-alerts
  template:
    metadata:
      labels:
        app: kube-pod-alerts
    spec:
      serviceAccountName: kube-pod-alerts
      containers:
        - name: kube-pod-alerts
          image: your-registry/kube-pod-alerts:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TEAMS_WEBHOOK_URL
              value: "https://outlook.office.com/webhook/replace-me"
            - name: KUBE_USE_CLUSTER
              value: "true"
            - name: RECOVERY_ALERT
              value: "true"
            - name: FLOOD_EXPIRE
              value: "60000"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
